name: Portfolio Admin (smart autofill)

on:
  workflow_dispatch:
    inputs:
      action:
        description: What do you want to do?
        type: choice
        options: [buy, sell, add_watch, deactivate_watch]
        required: true
      symbol:
        description: Ticker (e.g., AMD, RR.L, XESC.DE)
        required: true
      quantity:
        description: Quantity (buy/sell only; blank for others)
        required: false
        default: ""
      price:
        description: Price/share (buy only; blank = use current price)
        required: false
        default: ""
      currency:
        description: Currency (blank = yfinance)
        required: false
        default: ""
      note:
        description: Optional note (never auto-filled)
        required: false
        default: ""

jobs:
  admin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pymysql

      - name: Execute admin action (with yfinance autofill)
        env:
          ACTION: ${{ github.event.inputs.action }}
          SYMBOL: ${{ github.event.inputs.symbol }}
          QTY_IN: ${{ github.event.inputs.quantity }}
          PRICE_IN: ${{ github.event.inputs.price }}
          CURR_IN: ${{ github.event.inputs.currency }}
          NOTE_IN: ${{ github.event.inputs.note }}
        run: |
          python - <<'PY'
          import os, sys, decimal, pymysql
          import yfinance as yf

          def die(msg):
            print(f"::error::{msg}")
            sys.exit(1)

          action   = (os.getenv("ACTION") or "").strip().lower()
          symbol   = (os.getenv("SYMBOL") or "").strip()
          qty_in   = (os.getenv("QTY_IN") or "").strip()
          price_in = (os.getenv("PRICE_IN") or "").strip()
          curr_in  = (os.getenv("CURR_IN") or "").strip()
          note_in  = (os.getenv("NOTE_IN") or "").strip()

          if not symbol:
            die("symbol is required")

          # yfinance lookups (only for fields that are blank)
          tk = yf.Ticker(symbol)

          # currency
          currency = curr_in or None
          if not currency:
            fi = getattr(tk, "fast_info", None)
            currency = None
            if isinstance(fi, dict):
              currency = fi.get("currency")
            elif fi is not None:
              currency = getattr(fi, "currency", None)
            if not currency:
              try:
                info = tk.get_info()
                currency = info.get("currency")
              except Exception:
                currency = None
            if not currency:
              currency = "USD"  # sensible fallback
              print(f"::warning::currency not found for {symbol}, defaulting to USD")

          # current price (for buy if price blank)
          def resolve_last_price():
            # Try fast_info
            fi = getattr(tk, "fast_info", None)
            if isinstance(fi, dict):
              p = fi.get("lastPrice") or fi.get("last_price") or fi.get("last_traded_price")
              if p: return float(p)
            elif fi is not None:
              p = getattr(fi, "last_price", None)
              if p: return float(p)
            # Fallback: history
            try:
              hist = tk.history(period="1d", interval="1d")
              if not hist.empty:
                return float(hist["Close"].dropna().iloc[-1])
            except Exception:
              pass
            return None

          last_price = None
          if not price_in:
            last_price = resolve_last_price()
            if last_price is None and action == "buy":
              die(f"could not resolve current price for {symbol}")
          else:
            try:
              last_price = float(price_in)
            except Exception:
              die("price must be a number if provided")

          # longName -> tickers.name (canonical); NEVER used as note
          long_name = None
          try:
            info = tk.get_info()
            long_name = info.get("longName") or info.get("shortName")
          except Exception:
            pass

          # normalize decimals
          def dec_or_none(s):
            try:
              return decimal.Decimal(s)
            except Exception:
              return None

          qty = dec_or_none(qty_in) if qty_in else None
          price_dec = decimal.Decimal(str(last_price)) if last_price is not None else None

          # DB connect
          cn = pymysql.connect(
            host=os.getenv("DB_HOST"),
            user=os.getenv("DB_USER"),
            password=os.getenv("DB_PASS"),
            database=os.getenv("DB_NAME"),
            port=int(os.getenv("DB_PORT") or "3306"),
            autocommit=True,
            connect_timeout=10,
          )
          cur = cn.cursor()

          if action == "buy":
            if qty is None or qty <= 0:
              die("quantity is required and must be > 0 for buy")
            if price_dec is None:
              die("price could not be resolved for buy action")
            # CALL sp_buy(symbol, currency, qty, price, name, note)
            cur.execute(
              "CALL sp_buy(%s,%s,%s,%s,%s,%s)",
              (symbol, currency, str(qty), str(price_dec), long_name, (note_in or None))
            )
            print(f"Buy OK -> {symbol} qty={qty} price={price_dec} cc={currency} name={long_name!r} note={(note_in or None)!r}")

          elif action == "sell":
            if qty is None or qty <= 0:
              die("quantity is required and must be > 0 for sell")
            # CALL sp_sell(symbol, qty, note)
            cur.execute("CALL sp_sell(%s,%s,%s)", (symbol, str(qty), (note_in or None)))
            print(f"Sell OK -> {symbol} qty={qty} note={(note_in or None)!r}")

          elif action == "add_watch":
            # CALL sp_add_watch(symbol, currency, note, name)
            cur.execute(
              "CALL sp_add_watch(%s,%s,%s,%s)",
              (symbol, currency, (note_in or None), long_name)
            )
            print(f"Watch OK -> {symbol} cc={currency} name={long_name!r} note={(note_in or None)!r}")

          elif action == "deactivate_watch":
            cur.execute("CALL sp_deactivate_watch(%s)", (symbol,))
            print(f"Watch deactivated -> {symbol}")

          else:
            die(f"unsupported action: {action}")

          # Feedback
          cur.execute("""
            SELECT t.symbol, t.currency, t.name, h.quantity, h.avg_cost, h.note
            FROM tickers t
            LEFT JOIN holdings h ON h.ticker_id = t.id
            WHERE t.symbol=%s
          """, (symbol,))
          print("Row ->", cur.fetchall())
          PY

      - name: Quick summary tables (optional)
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" --ssl-mode=REQUIRED "$DB_NAME" -e "
            SELECT t.symbol, t.currency, t.name, h.quantity, h.avg_cost, h.note
            FROM tickers t LEFT JOIN holdings h ON h.ticker_id=t.id
            ORDER BY t.symbol;
            SELECT t.symbol, w.active, w.note
            FROM watchlist w JOIN tickers t ON t.id=w.ticker_id
            ORDER BY t.symbol;"
