name: Portfolio Admin (smart autofill)

on:
  workflow_dispatch:
    inputs:
      action:
        description: What do you want to do?
        type: choice
        options: [buy, sell, add_watch, deactivate_watch]
        required: true
      symbol:
        description: Ticker (e.g., AMD, RR.L, XESC.DE)
        required: true
      quantity:
        description: Quantity (buy/sell only; blank for others)
        required: false
        default: ""
      broker:
        description: Broker (buy/sell only)
        type: choice
        options: ["", HeyTrade, MyInvestor, BBVA]
        required: false
        default: ""
      price:
        description: Price/share (buy only; blank = use current price)
        required: false
        default: ""
      currency:
        description: Currency (blank = yfinance)
        required: false
        default: ""
      note:
        description: Optional note (never auto-filled)
        required: false
        default: ""

jobs:
  admin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pymysql

      - name: Execute admin action (with yfinance autofill)
        env:
          ACTION: ${{ github.event.inputs.action }}
          SYMBOL: ${{ github.event.inputs.symbol }}
          QTY_IN: ${{ github.event.inputs.quantity }}
          PRICE_IN: ${{ github.event.inputs.price }}
          BROKER_IN: ${{ github.event.inputs.broker }}
          CURR_IN: ${{ github.event.inputs.currency }}
          NOTE_IN: ${{ github.event.inputs.note }}
        run: |
          python admin.py

      - name: Run collector (capture immediate snapshot)
        run: |
          python collector.py
      - name: Quick summary tables (optional)
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" --ssl-mode=REQUIRED "$DB_NAME" -e "
            SELECT t.symbol, t.currency, t.name, h.quantity, h.avg_cost, h.note
            FROM tickers t LEFT JOIN holdings h ON h.ticker_id=t.id
            ORDER BY t.symbol;
            SELECT t.symbol, w.active, w.note
            FROM watchlist w JOIN tickers t ON t.id=w.ticker_id
            ORDER BY t.symbol;"
