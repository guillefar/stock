name: Portfolio Admin

on:
  workflow_dispatch:
    inputs:
      action:
        description: What do you want to do?
        type: choice
        options: [buy, sell, add_watch, deactivate_watch]
        required: true
      symbol:
        description: Ticker symbol (e.g., AMD, RR.L, XESC.DE)
        required: true
      currency:
        description: Currency (buy/add_watch only; e.g., USD, EUR, GBX)
        required: false
        default: USD
      quantity:
        description: Quantity (buy/sell only)
        required: false
        default: "0"
      price:
        description: Price per share (buy only)
        required: false
        default: "0"
      note:
        description: Note (add_watch only)
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}
      DB_NAME: ${{ secrets.DB_NAME }}
    steps:
      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Execute action
        run: |
          set -euo pipefail
          ACTION="${{ github.event.inputs.action }}"
          SYMBOL="${{ github.event.inputs.symbol }}"
          CURRENCY="${{ github.event.inputs.currency }}"
          QTY="${{ github.event.inputs.quantity }}"
          PRICE="${{ github.event.inputs.price }}"
          NOTE="${{ github.event.inputs.note }}"
          NOTE_ESCAPED=$(printf "%s" "$NOTE" | sed "s/'/''/g")

          case "$ACTION" in
            buy)
              mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" --ssl-mode=REQUIRED "$DB_NAME" \
                -e "CALL sp_buy('${SYMBOL}', '${CURRENCY}', ${QTY}+0, ${PRICE}+0);"
              ;;
            sell)
              mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" --ssl-mode=REQUIRED "$DB_NAME" \
                -e "CALL sp_sell('${SYMBOL}', ${QTY}+0, ${PRICE}+0);"
              ;;
            add_watch)
              mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" --ssl-mode=REQUIRED "$DB_NAME" \
                -e "CALL sp_add_watch('${SYMBOL}', '${CURRENCY}', '${NOTE_ESCAPED}');"
              ;;
            deactivate_watch)
              mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" --ssl-mode=REQUIRED "$DB_NAME" \
                -e "CALL sp_deactivate_watch('${SYMBOL}');"
              ;;
            *)
              echo "Unknown action: $ACTION"; exit 1;;
          esac

      - name: Show current holdings & watchlist (feedback)
        run: |
          mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" --ssl-mode=REQUIRED "$DB_NAME" -e "
            SELECT t.symbol, h.quantity, h.avg_cost
            FROM holdings h JOIN tickers t ON t.id=h.ticker_id
            ORDER BY t.symbol;
            SELECT t.symbol, w.active, w.note
            FROM watchlist w JOIN tickers t ON t.id=w.ticker_id
            WHERE w.active=1
            ORDER BY t.symbol;"
